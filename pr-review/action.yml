name: 'Claude PR Review'
description: 'Uses Claude to review a pull request for code quality, security, performance, and test coverage'

inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token'
    required: true
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-5'
  max_turns:
    description: 'Maximum number of Claude turns'
    required: false
    default: '30'

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Resolve diff base
      if: github.event.action == 'synchronize'
      id: resolve-diff-base
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        DIFF_FALLBACK_SHA: ${{ github.event.before }}
      run: |
        # Walk PR commits newest-first (excluding HEAD, which hasn't been reviewed yet)
        # and find the most recent commit carrying a claude-pr-review:success status.
        # Export DIFF_BASE_SHA for use by the "Set diff scope" step.
        REPO="$GH_REPOSITORY"
        PR_NUMBER="$PR_NUMBER"
        FALLBACK="$DIFF_FALLBACK_SHA"

        # Fetch the list of PR commit SHAs, oldest-first (GitHub API default), then reverse.
        COMMITS=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" \
          --jq '[.[].sha] | reverse | .[]' 2>/dev/null || true)

        if [ -z "$COMMITS" ]; then
          echo "Warning: Could not fetch PR commits list — will fall back to github.event.before"
        fi

        CHECKPOINT=""
        # Skip the first entry — that is HEAD (the current push), not yet reviewed.
        FIRST=true
        while IFS= read -r sha; do
          if [ "$FIRST" = "true" ]; then
            FIRST=false
            continue
          fi
          # Count statuses on this commit that match context=claude-pr-review and state=success.
          COUNT=$(gh api "repos/$REPO/commits/$sha/statuses" \
            --jq '[.[] | select(.context == "claude-pr-review" and .state == "success")] | length' \
            2>/dev/null || echo "0")
          if [ "$COUNT" -gt "0" ]; then
            CHECKPOINT="$sha"
            break
          fi
        done <<< "$COMMITS"

        if [ -n "$CHECKPOINT" ]; then
          echo "Found review checkpoint: $CHECKPOINT — using as diff base"
          echo "DIFF_BASE_SHA=$CHECKPOINT" >> "$GITHUB_ENV"
        elif [ -n "$FALLBACK" ] && [ "$FALLBACK" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$FALLBACK" 2>/dev/null; then
          echo "No checkpoint found — falling back to github.event.before ($FALLBACK)"
          echo "DIFF_BASE_SHA=$FALLBACK" >> "$GITHUB_ENV"
        else
          echo "No checkpoint and github.event.before is invalid or zero SHA — using full PR diff"
          echo "DIFF_BASE_SHA=" >> "$GITHUB_ENV"
        fi

    - name: Set diff scope
      shell: bash
      # shellcheck disable=SC2016
      env:
        AFTER_SHA: ${{ github.event.after }}
        EVENT_ACTION: ${{ github.event.action }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        if [ "$EVENT_ACTION" = "synchronize" ] && [ -n "$DIFF_BASE_SHA" ]; then
          # DIFF_BASE_SHA is set by the "Resolve diff base" step above.
          # We interpolate it here via shell variable expansion (not expression syntax) so
          # the value the Claude prompt sees is the checkpoint SHA, not the literal expression.
          # Use the heredoc delimiter format required by GitHub for multiline env values —
          # plain KEY=VALUE is rejected when the value contains embedded newlines.
          {
            printf 'DIFF_INSTRUCTION<<EOF\n'
            printf 'This is a synchronize event (new commits were pushed to the PR). Start by running `git diff %s %s` to see only the changes in this push.\n\nAfter inspecting the diff, use your judgment: if the changes touch foundational or widely-shared code — such as base classes, abstract classes, interfaces, shared utilities, type definitions, schemas, authentication/authorization logic, or configuration files that many other files depend on — then also run `gh pr diff %s` to get the full PR context before completing your review.\n\nIf the changes are isolated (self-contained features, local logic, tests, docs), review only the incremental changes and do not re-review files already covered in previous commits.\n' \
              "$DIFF_BASE_SHA" "$AFTER_SHA" "$PR_NUMBER"
            printf 'EOF\n'
          } >> "$GITHUB_ENV"
        else
          # Single-line value — plain KEY=VALUE format is valid here (no embedded newlines)
          printf 'DIFF_INSTRUCTION=Use `gh pr diff %s` to retrieve the full PR diff.\n' \
            "$PR_NUMBER" >> "$GITHUB_ENV"
        fi

    - name: Compute effective max_turns
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        CALLER_MAX_INPUT: ${{ inputs.max_turns }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        CALLER_MAX="$CALLER_MAX_INPUT"
        # Default to 0 if empty or non-numeric (defense-in-depth; action default is '30')
        if ! [[ "$CALLER_MAX" =~ ^[0-9]+$ ]]; then
          CALLER_MAX=0
        fi
        FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files | length' 2>/dev/null || echo "0")
        if ! [[ "$FILES" =~ ^[0-9]+$ ]]; then
          FILES=0
        fi
        # Scale max_turns by PR size:
        #   small  (≤10 files) → 30 turns
        #   medium (11-30)     → 45 turns
        #   large  (>30)       → 60 turns
        if [ "$FILES" -gt 30 ]; then
          DYNAMIC=60
        elif [ "$FILES" -gt 10 ]; then
          DYNAMIC=45
        else
          DYNAMIC=30
        fi
        if [ "$CALLER_MAX" -gt "$DYNAMIC" ]; then
          EFFECTIVE_MAX="$CALLER_MAX"
        else
          EFFECTIVE_MAX="$DYNAMIC"
        fi
        echo "EFFECTIVE_MAX_TURNS=$EFFECTIVE_MAX" >> "$GITHUB_ENV"
        echo "PR_FILES=$FILES" >> "$GITHUB_ENV"

    - name: Check author association
      id: authz
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        PR_ACTOR: ${{ github.event.pull_request.user.login }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        ASSOCIATION="$AUTHOR_ASSOCIATION"
        ACTOR="$PR_ACTOR"
        if [ "$ASSOCIATION" = "OWNER" ] || [ "$ASSOCIATION" = "MEMBER" ] || [ "$ASSOCIATION" = "COLLABORATOR" ]; then
          echo "Authorized: $ACTOR ($ASSOCIATION)"
        else
          gh pr comment "$PR_NUMBER" --body "Automated review is restricted to repository members. A maintainer can trigger a review by commenting \`@claude review this PR\`."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Check PR size
      id: size-check
      if: steps.authz.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files | length' 2>/dev/null || echo "0")
        ADDITIONS=$(gh pr view "$PR_NUMBER" --json additions --jq '.additions' 2>/dev/null || echo "0")
        DELETIONS=$(gh pr view "$PR_NUMBER" --json deletions --jq '.deletions' 2>/dev/null || echo "0")
        LINES=$(( ADDITIONS + DELETIONS ))
        if [ "$FILES" -gt 50 ] || [ "$LINES" -gt 5000 ]; then
          gh pr comment "$PR_NUMBER" --body "This PR is too large for automated review ($FILES files, $LINES lines changed). Consider breaking it into smaller, focused PRs."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "PR size OK: $FILES files, $LINES lines"
        fi

    - name: Record review start time
      shell: bash
      run: echo "REVIEW_START_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

    - uses: anthropics/claude-code-action@v1
      id: claude-review
      if: steps.authz.outputs.skip != 'true' && steps.size-check.outputs.skip != 'true'
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ github.token }}
        use_sticky_comment: true
        track_progress: true
        claude_args: --max-turns ${{ env.EFFECTIVE_MAX_TURNS }} --model ${{ inputs.model }} --allowedTools "Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr view:*)"
        prompt: |
          Review the pull request in repository ${{ github.repository }} (#${{ github.event.pull_request.number }}).

          ${{ env.DIFF_INSTRUCTION }}

          Evaluate the changes across these dimensions:

          1. **Code quality** — clarity, naming, structure, duplication, and adherence to the language's idiomatic style
          2. **Security** — injection risks, secrets in code, insecure dependencies, unsafe deserialization, improper auth checks
          3. **Performance** — unnecessary allocations, N+1 queries, blocking calls, inefficient algorithms
          4. **Test coverage** — are new code paths tested? are edge cases and error paths covered?
          5. **Documentation** — are public APIs, functions, and non-obvious logic commented or documented?

          Post a summary comment on the PR. Where a specific line is problematic, post an inline review comment on that line using `gh pr review`. Be constructive and specific — cite the line and explain the concern and a suggested fix.

    - name: Record review checkpoint
      if: github.event.action == 'synchronize' && steps.claude-review.outcome == 'success'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPOSITORY: ${{ github.repository }}
        AFTER_SHA: ${{ github.event.after }}
      run: |
        # Post a commit status to the HEAD of this push so the next synchronize run
        # can find the last successfully reviewed SHA and use it as its diff base.
        gh api "repos/$GH_REPOSITORY/statuses/$AFTER_SHA" \
          -f state=success \
          -f context=claude-pr-review \
          -f description="Review complete"
        echo "Checkpoint recorded: $AFTER_SHA"

    - name: Post incomplete-review warning
      if: failure() && steps.authz.outputs.skip != 'true' && steps.size-check.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        EFFECTIVE_MAX_TURNS: ${{ env.EFFECTIVE_MAX_TURNS }}
        FILES: ${{ env.PR_FILES }}
        REVIEW_START_TIME: ${{ env.REVIEW_START_TIME }}
      run: |
        # Skip the warning if Claude already posted a review comment during this run.
        # Claude posts its summary as a regular PR comment (via use_sticky_comment), not a
        # formal review submission, so we check comments rather than reviews.
        # Filter by author (github-actions[bot]) and timestamp to avoid false positives
        # from human comments or comments posted by a prior run on the same PR.
        COMMENT_COUNT=$(gh pr view "$PR_NUMBER" --json comments \
          | jq --arg since "$REVIEW_START_TIME" \
          '[.comments[] | select(.author.login == "github-actions[bot]") | select(.createdAt > $since)] | length' \
          2>/dev/null || echo "0")

        if [ "$COMMENT_COUNT" -gt "0" ]; then
          echo "Claude posted a review comment during this run before hitting the turn limit — skipping incomplete-review warning"
          exit 0
        fi

        gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
        ⚠️ **Automated PR review incomplete**

        Claude hit the turn limit before finishing this review. The PR may be too large or complex for the current settings.

        **What happened:** The review was cut off at $EFFECTIVE_MAX_TURNS turns (PR has $FILES files changed).

        **Options:**
        - Re-run the workflow with a higher \`max_turns\` input
        - Break the PR into smaller, focused pieces
        - Trigger a manual review with \`@claude review this PR\`
        EOF
        )"
