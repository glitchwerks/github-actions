# Authoritative CI Claude Runtime manifest.
# Schema: runtime/ci-manifest.schema.json
# Spec: docs/superpowers/specs/2026-04-21-ci-claude-runtime-design.md §5.1

sources:
  private:
    repo: glitchwerks/claude-configs
    ref: ci-v0.1.0
  marketplace:
    repo: anthropics/claude-plugins-official
    ref: 0742692199b49af5c6c33cd68ee674fb2e679d50

shared:
  imports_from_private:
    skills: [git, python]
    agents: [ops]
    claude_md: CLAUDE.md
    standards: standards/software-standards.md
  local:
    claude_md: runtime/shared/CLAUDE-ci.md
  plugins:
    context7:
      paths: ["**"]
    github:
      paths: ["**"]
    typescript-lsp:
      paths: ["**"]
    skill-creator:
      paths: ["**"]
    security-guidance:
      paths:
        - hooks/hooks.json
        - hooks/security_reminder_hook.py

overlays:
  review:
    plugins:
      pr-review-toolkit:
        paths: ["**"]
    imports_from_private:
      agents: [inquisitor]
    local:
      claude_md: runtime/overlays/review/CLAUDE.md
    # Subtract base-inherited plugins per spec §10.2 must_not_contain compliance.
    # The base ships skill-creator (shared.plugins.skill-creator.paths: ["**"]),
    # which every overlay inherits via FROM. The review overlay must remove it
    # at build time to honor the "different eyes" principle (§3.1, §10.2).
    # Mechanism: extract-overlay.sh writes a marker file; the overlay's Dockerfile
    # RUN step rm -rf's the named directory. See plan Task 5.5 / spec §4.2 amend.
    subtract_from_shared:
      plugins: [skill-creator]

  fix:
    imports_from_private:
      agents: [debugger, code-writer]
    local:
      claude_md: runtime/overlays/fix/CLAUDE.md

  explain:
    imports_from_private: {}
    local:
      claude_md: runtime/overlays/explain/CLAUDE.md

merge_policy:
  on_conflict: error
  overrides: []
