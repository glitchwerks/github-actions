name: 'Claude Lint Apply'
description: 'Downloads a lint-fix patch artifact and applies it to the PR branch — no Claude invocation'

inputs:
  app_id:
    description: 'GitHub App ID for generating a short-lived token'
    required: false
  app_private_key:
    description: 'GitHub App private key for generating a short-lived token'
    required: false
  pr_number:
    description: 'Pull request number'
    required: true

runs:
  using: composite
  steps:
    - name: Generate App token
      id: app-token
      if: inputs.app_id != '' && inputs.app_private_key != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}

    - name: Resolve write token
      id: token
      shell: bash
      # shellcheck disable=SC2016
      run: |
        if [ -n "${{ steps.app-token.outputs.token }}" ]; then
          echo "::debug::Using GitHub App token"
          echo "value=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
        else
          echo "::error::No authentication token provided. Set app_id + app_private_key inputs. See README for GitHub App setup instructions."
          exit 1
        fi

    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        token: ${{ steps.token.outputs.value }}
        fetch-depth: 0
        ref: refs/pull/${{ inputs.pr_number }}/head

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "Claude Lint-Fix"
        git config user.email "claude-lintfix@users.noreply.github.com"

    - name: Download patch artifact
      uses: actions/download-artifact@v4
      with:
        name: lint-patch-${{ github.repository_id }}-${{ inputs.pr_number }}
        path: /tmp/patch

    - name: Apply patch and commit
      shell: bash
      env:
        STEP: apply
        PATCH_FILE: /tmp/patch/lintfix.patch
        PR_NUMBER: ${{ inputs.pr_number }}
      run: node "${{ github.action_path }}/dist/index.js"

    - name: Push to PR branch
      shell: bash
      env:
        STEP: push
        PR_NUMBER: ${{ inputs.pr_number }}
        GITHUB_TOKEN: ${{ steps.token.outputs.value }}
      run: node "${{ github.action_path }}/dist/index.js"
