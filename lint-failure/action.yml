name: 'Claude Lint Fix'
description: 'Diagnoses lint failures on a PR and optionally commits a fix'

inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token'
    required: true
  gh_pat:
    description: 'GitHub PAT with repo scope for log fetch and git push'
    required: true
  pr_number:
    description: 'Pull request number'
    required: true
  run_id:
    description: 'Workflow run ID of the failed lint run'
    required: true
  auto_apply:
    description: 'If true, Claude will commit and push a high-confidence fix automatically'
    required: false
    default: 'false'
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-5'
  max_turns:
    description: 'Maximum number of Claude turns'
    required: false
    default: '20'

runs:
  using: composite
  steps:
    - name: Guard — PR number required
      shell: bash
      # shellcheck disable=SC2016
      run: |
        if [ -z "${{ inputs.pr_number }}" ]; then
          echo "::error::pr_number is empty. claude-lint-fix only supports pull_request triggers."
          exit 1
        fi

    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        token: ${{ inputs.gh_pat }}
        fetch-depth: 0
        ref: refs/pull/${{ inputs.pr_number }}/head

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "Claude Lint-Fix"
        git config user.email "claude-lintfix@users.noreply.github.com"

    - name: Fetch failed lint logs
      id: logs
      shell: bash
      # shellcheck disable=SC2016
      env:
        GH_TOKEN: ${{ inputs.gh_pat }}
      run: |
        LOG_URL="https://github.com/${{ github.repository }}/actions/runs/${{ inputs.run_id }}"
        echo "log_url=$LOG_URL" >> "$GITHUB_OUTPUT"
        if ! gh run view "${{ inputs.run_id }}" --log-failed 2>/tmp/log_err.txt | head -c 16000 > /tmp/lint_logs.txt; then
          echo "::error::Failed to download lint logs: $(cat /tmp/log_err.txt)"
          exit 1
        fi

    - name: Fetch PR diff
      shell: bash
      # shellcheck disable=SC2016
      env:
        GH_TOKEN: ${{ inputs.gh_pat }}
      run: |
        # Limit to first 30 files to avoid truncating mid-JSON (head -c on JSON is unsafe)
        gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}/files \
          --jq '[.[] | {filename: .filename, patch: .patch}] | .[0:30]' \
          > /tmp/pr_diff.json

    - name: Diagnose lint failure and optionally apply fix
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ inputs.gh_pat }}
        use_sticky_comment: true
        track_progress: false
        # Tools: Bash (gh/git), Read (logs/diffs/CLAUDE.md), Write (patch file)
        claude_args: --max-turns ${{ inputs.max_turns }} --model ${{ inputs.model }} --allowedTools Bash,Read,Write
        prompt: |
          A linter has failed on pull request #${{ inputs.pr_number }} in repository ${{ github.repository }}.

          Your job is to identify the specific lint violations and, if you are confident in a minimal fix, apply it.

          ## Step 1 — Read the evidence

          Read the following files written by prior workflow steps:
          - `/tmp/lint_logs.txt` — raw output from the failed lint steps (up to 16 000 chars)
          - `/tmp/pr_diff.json` — files changed by the PR with their diffs (JSON array)

          Also read `CLAUDE.md` if it exists in the repository root — it documents linting tools and conventions.

          ## Step 2 — Post a structured diagnosis comment

          Post a comment on PR #${{ inputs.pr_number }} using:
            gh pr comment ${{ inputs.pr_number }} --body "..."

          The comment must follow this exact structure:

              ## Claude Lint Diagnosis

              **Summary:** <one sentence — which linter failed and how many violations>

              **Violations:**
              <bullet list — each item: file path, line number, rule name, short description>

              **Suggested fix:** <one sentence describing the minimal change needed>

              ```diff
              <unified diff of the fix, or omit this block entirely if no code change is needed>
              ```

              **Confidence:** <high | medium | low> | [View lint logs](${{ steps.logs.outputs.log_url }})

              ---
              _This diagnosis was generated automatically by Claude. Review before applying any fix._

          Only report violations that appear in the log output. Do not infer violations from the diff alone.

          ## Step 3 — Apply the fix (conditional)

          Auto-apply is **${{ inputs.auto_apply != 'false' && 'enabled' || 'disabled' }}** for this run.

          If auto-apply is **enabled** AND your confidence is **high** AND you produced a non-empty fix diff:

          1. Confirm the fix diff does not touch any path under `.github/`. If it does, skip the apply and note this in the comment.
          2. Write the unified diff to `/tmp/lintfix.patch`.
          3. Apply it: `git apply --index /tmp/lintfix.patch`
          4. Commit: `git commit -m "Claude lint-fix: <fix_description>\n\nApplied automatically by claude-lint-fix workflow.\nPR: #${{ inputs.pr_number }}"`
          5. Push to the PR branch: run `gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }} --jq '.head.ref'` to get the branch name, then `git push origin HEAD:<branch>`.
          6. Append a brief note to the PR comment confirming the fix was applied and the commit SHA.

          If auto-apply is **disabled**, or confidence is **medium** or **low**, or there is no fix diff, stop after posting the comment. Do not modify any files.
