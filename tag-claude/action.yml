name: 'Tag Claude'
description: 'Responds to @claude mentions in issues and pull request comments'

# NOTE: Composite actions cannot declare a concurrency block. If you want
# per-user concurrency (cancel-in-progress when the same user triggers a
# second run), add the following to the job that calls this action:
#
#   concurrency:
#     group: claude-tag-${{ github.repository }}-${{ github.event.comment.user.login }}
#     cancel-in-progress: true

inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token'
    required: true
  trigger_phrase:
    description: 'Phrase that triggers Claude'
    required: false
    default: '@claude'
  require_association:
    description: 'Only allow OWNER, MEMBER, and COLLABORATOR to trigger Claude'
    required: false
    default: 'true'
  authorized_users:
    description: 'Comma-separated list of GitHub usernames authorized to trigger Claude. When set, overrides require_association.'
    required: false
    default: ''
  app_id:
    description: 'GitHub App ID for generating a short-lived token (required — no github.token fallback)'
    required: false
  app_private_key:
    description: 'GitHub App private key for generating a short-lived token (required — no github.token fallback)'
    required: false
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-5'
  max_turns:
    description: 'Maximum number of Claude turns'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Check authorization
      id: authz
      uses: cbeaulieu-gt/github-actions/check-auth@v1
      with:
        require_association: ${{ inputs.require_association }}
        authorized_users: ${{ inputs.authorized_users }}

    - name: Generate App token
      id: app-token
      if: steps.authz.outputs.authorized == 'true' && inputs.app_id != '' && inputs.app_private_key != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}

    - name: Resolve write token
      id: token
      if: steps.authz.outputs.authorized == 'true'
      shell: bash
      # shellcheck disable=SC2016
      run: |
        if [ -n "${{ steps.app-token.outputs.token }}" ]; then
          echo "::debug::Using GitHub App token"
          echo "value=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
        else
          echo "::error::No authentication token provided. Set app_id + app_private_key inputs. See README for GitHub App setup instructions."
          exit 1
        fi

    - uses: actions/checkout@v4
      if: steps.authz.outputs.authorized == 'true'
      with:
        token: ${{ steps.token.outputs.value }}

    - name: Build claude args
      id: args
      if: steps.authz.outputs.authorized == 'true'
      shell: bash
      run: |
        ARGS="--model ${{ inputs.model }}"
        if [ -n "${{ inputs.max_turns }}" ]; then
          ARGS="$ARGS --max-turns ${{ inputs.max_turns }}"
        fi
        echo "claude_args=$ARGS" >> "$GITHUB_OUTPUT"

    - name: Record run start time
      if: steps.authz.outputs.authorized == 'true'
      shell: bash
      run: echo "RUN_START_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

    - uses: anthropics/claude-code-action@v1
      if: steps.authz.outputs.authorized == 'true'
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ steps.token.outputs.value }}
        trigger_phrase: ${{ inputs.trigger_phrase }}
        claude_args: ${{ steps.args.outputs.claude_args }}

    - name: Post incomplete-run warning
      if: failure() && steps.authz.outputs.authorized == 'true'
      shell: bash
      # shellcheck disable=SC2016
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        # GitHub populates issue.number for both issue comments and PR review comments,
        # so gh issue comment works in both contexts without branching on event type.
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        MAX_TURNS: ${{ inputs.max_turns }}
        RUN_START_TIME: ${{ env.RUN_START_TIME }}
      run: |
        if [ -z "$ISSUE_NUMBER" ]; then
          echo "No issue number found in event context, skipping incomplete-run warning"
          exit 0
        fi

        # Skip the warning if Claude already posted a comment during this run.
        # Filter by author (github-actions[bot]) and timestamp to avoid false positives
        # from prior runs or comments by other automation on the same issue/PR.
        COMMENT_COUNT=$(gh issue view "$ISSUE_NUMBER" --json comments \
          | jq --arg since "$RUN_START_TIME" \
          '[.comments[] | select(.author.login == "github-actions[bot]") | select(.createdAt > $since)] | length' \
          2>/dev/null || echo "0")

        if [ "$COMMENT_COUNT" -gt "0" ]; then
          echo "Claude posted a comment during this run before hitting the turn limit — skipping incomplete-run warning"
          exit 0
        fi

        if [ -n "$MAX_TURNS" ]; then
          TURNS_MSG="The run was cut off at $MAX_TURNS turns."
        else
          TURNS_MSG="The run was cut off when Claude hit its turn limit."
        fi

        gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
        ⚠️ **@claude run incomplete**

        $TURNS_MSG

        **Options:**
        - Re-trigger with \`@claude\` and a more focused request
        - Pass a higher \`max_turns\` value in the caller workflow
        EOF
        )"
