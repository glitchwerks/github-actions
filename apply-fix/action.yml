name: 'Apply Claude Fix'
description: 'Checks out a PR branch, validates a unified diff against protected paths, applies it, and pushes the result'

inputs:
  pr_number:
    description: 'PR number to apply the fix to'
    required: true
  fix_diff:
    description: 'Unified diff to apply (output of git diff or similar)'
    required: true
  fix_description:
    description: 'One-line description of the fix (used as the commit message body)'
    required: true
  app_id:
    description: 'GitHub App ID for generating a short-lived token'
    required: false
  app_private_key:
    description: 'GitHub App private key for generating a short-lived token'
    required: false

runs:
  using: composite
  steps:
    - name: Generate App token
      id: app-token
      if: inputs.app_id != '' && inputs.app_private_key != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}

    - name: Resolve write token
      id: token
      shell: bash
      # shellcheck disable=SC2016
      run: |
        if [ -n "${{ steps.app-token.outputs.token }}" ]; then
          echo "::debug::Using GitHub App token"
          echo "value=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
        else
          echo "::error::No authentication token provided. Set app_id + app_private_key inputs. See README for GitHub App setup instructions."
          exit 1
        fi

    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        token: ${{ steps.token.outputs.value }}
        ref: refs/pull/${{ inputs.pr_number }}/head
        fetch-depth: 0

    - name: Configure git
      shell: bash
      run: |
        git config user.name "Claude Auto-Fix"
        git config user.email "claude-autofix@users.noreply.github.com"

    - name: Apply fix and validate protected paths
      shell: bash
      env:
        STEP: apply
        DIFF_CONTENT: ${{ inputs.fix_diff }}
        FIX_DESC: ${{ inputs.fix_description }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: node "${{ github.action_path }}/dist/index.js"

    - name: Push fix
      shell: bash
      env:
        STEP: push
        PR_NUMBER: ${{ inputs.pr_number }}
        GITHUB_TOKEN: ${{ steps.token.outputs.value }}
      run: node "${{ github.action_path }}/dist/index.js"
