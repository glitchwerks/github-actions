name: 'Claude Lint Diagnose'
description: 'Diagnoses lint failures on a PR, posts a structured comment, and uploads a patch artifact when confidence is high'

inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token'
    required: true
  app_id:
    description: 'GitHub App ID for generating a short-lived token'
    required: false
  app_private_key:
    description: 'GitHub App private key for generating a short-lived token'
    required: false
  pr_number:
    description: 'Pull request number'
    required: true
  run_id:
    description: 'Workflow run ID of the failed lint run'
    required: true
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-5'
  max_turns:
    description: 'Maximum number of Claude turns'
    required: false
    default: '20'

outputs:
  confidence:
    description: 'Confidence level written by Claude: high, medium, or low'
    value: ${{ steps.read-outputs.outputs.confidence }}
  has_patch:
    description: "true if a patch file was written and is non-empty, false otherwise"
    value: ${{ steps.read-outputs.outputs.has_patch }}

runs:
  using: composite
  steps:
    - name: Guard — PR number required
      shell: bash
      # shellcheck disable=SC2016
      run: |
        pr_val="${{ inputs.pr_number }}"
        if [[ ! "$pr_val" =~ ^[0-9]+$ ]]; then
          echo "::error::pr_number is not a valid PR number (got: '${pr_val:0:120}'). claude-lint-fix only supports pull_request triggers."
          exit 1
        fi

    - name: Generate App token
      id: app-token
      if: inputs.app_id != '' && inputs.app_private_key != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}

    - name: Resolve write token
      id: token
      shell: bash
      # shellcheck disable=SC2016
      run: |
        if [ -n "${{ steps.app-token.outputs.token }}" ]; then
          echo "::debug::Using GitHub App token"
          echo "value=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
        else
          echo "::error::No authentication token provided. Set app_id + app_private_key inputs. See README for GitHub App setup instructions."
          exit 1
        fi

    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        token: ${{ steps.token.outputs.value }}
        fetch-depth: 0
        ref: refs/pull/${{ inputs.pr_number }}/head

    - name: Fetch failed lint logs
      id: logs
      shell: bash
      env:
        STEP: fetch-logs
        RUN_ID: ${{ inputs.run_id }}
        GITHUB_TOKEN: ${{ steps.token.outputs.value }}
      run: node "${{ github.action_path }}/dist/index.js"

    - name: Fetch PR diff
      shell: bash
      env:
        STEP: fetch-diff
        PR_NUMBER: ${{ inputs.pr_number }}
        GITHUB_TOKEN: ${{ steps.token.outputs.value }}
      run: node "${{ github.action_path }}/dist/index.js"

    - name: Build prompt
      id: build-prompt
      shell: bash
      env:
        STEP: build-prompt
        PR_NUMBER: ${{ inputs.pr_number }}
        LOG_URL: ${{ steps.logs.outputs.log_url }}
        AUTO_APPLY: 'false'
      run: node "${{ github.action_path }}/dist/index.js"

    - name: Diagnose lint failure
      id: claude-diagnose
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ steps.token.outputs.value }}
        use_sticky_comment: true
        track_progress: false
        claude_args: --max-turns ${{ inputs.max_turns }} --model ${{ inputs.model }} --allowedTools Bash,Read,Write
        prompt: ${{ steps.build-prompt.outputs.prompt }}

    - name: Read confidence and set outputs
      id: read-outputs
      shell: bash
      env:
        STEP: read-outputs
      run: node "${{ github.action_path }}/dist/index.js"

    - name: Upload patch artifact
      if: steps.read-outputs.outputs.has_patch == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lint-patch-${{ github.repository_id }}-${{ inputs.pr_number }}
        path: /tmp/lintfix.patch
        retention-days: 1
