name: Claude Lint Fix

on:
  workflow_call:
    secrets:
      claude_code_oauth_token:
        required: true
      app_id:
        required: true
      app_private_key:
        required: true
    inputs:
      pr_number:
        description: 'Pull request number — pass github.event.pull_request.number from the caller'
        type: string
        required: true
      run_id:
        description: 'Workflow run ID for log fetch — pass github.run_id from the caller'
        type: string
        required: true
      model:
        description: 'Claude model to use'
        type: string
        required: false
        default: 'claude-sonnet-4-5'
      max_turns:
        description: 'Maximum number of Claude turns'
        type: string
        required: false
        default: '20'
      auto_apply:
        description: 'If true, a high-confidence patch will be committed and pushed automatically'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    concurrency:
      group: claude-lint-fix-diagnose-${{ github.repository }}-${{ inputs.pr_number }}
      cancel-in-progress: true
    outputs:
      confidence: ${{ steps.diagnose.outputs.confidence }}
      has_patch: ${{ steps.diagnose.outputs.has_patch }}
    steps:
      - uses: cbeaulieu-gt/github-actions/lint-diagnose@v1
        id: diagnose
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          app_id: ${{ secrets.app_id }}
          app_private_key: ${{ secrets.app_private_key }}
          pr_number: ${{ inputs.pr_number }}
          run_id: ${{ inputs.run_id }}
          model: ${{ inputs.model }}
          max_turns: ${{ inputs.max_turns }}

  apply:
    runs-on: ubuntu-latest
    needs: diagnose
    if: inputs.auto_apply == true && needs.diagnose.outputs.confidence == 'high' && needs.diagnose.outputs.has_patch == 'true'
    concurrency:
      group: claude-lint-fix-apply-${{ github.repository }}-${{ inputs.pr_number }}
      cancel-in-progress: false
    steps:
      - uses: cbeaulieu-gt/github-actions/lint-apply@v1
        with:
          app_id: ${{ secrets.app_id }}
          app_private_key: ${{ secrets.app_private_key }}
          pr_number: ${{ inputs.pr_number }}
