name: Lint

on: [push, pull_request]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
      - name: Lint composite actions
        # raven-actions/actionlint@v2 only lints .github/workflows/*.yml by default.
        # Composite actions (*/action.yml) require explicit targeting.
        # actionlint is on PATH after the previous step — no separate install needed.
        # When adding new composite actions, the glob */action.yml picks them up automatically.
        shell: bash
        run: actionlint ./*/action.yml
