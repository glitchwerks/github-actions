name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Check for dist/ changes
        id: check
        run: |
          if [ -n "$(git diff --name-only -- '*/dist')" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit rebuilt dist/
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*/dist'
          git commit -m "chore: rebuild dist/ for ${{ inputs.version }}"
          git push

      - name: Extract major version
        id: major
        run: |
          MAJOR=$(echo "${{ inputs.version }}" | sed -n 's/^\(v[0-9]\+\).*/\1/p')
          echo "tag=$MAJOR" >> "$GITHUB_OUTPUT"

      # Release tagging strategy:
      # - Pinned tag (e.g. v2.1.0) for reproducible builds
      # - Floating major tag (e.g. v2) always points to latest v2.x.x
      # Both are force-pushed so the floating tag moves forward
      - name: Create version tag
        run: |
          git tag -f "${{ inputs.version }}"
          git push origin "${{ inputs.version }}" --force

      - name: Move floating major tag
        run: |
          git tag -f "${{ steps.major.outputs.tag }}"
          git push origin "${{ steps.major.outputs.tag }}" --force
