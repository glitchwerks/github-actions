name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  router-cases:
    name: claude-command-router corpus
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run router tests
        run: bash ./claude-command-router/tests/run-cases.sh
