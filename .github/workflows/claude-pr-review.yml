name: Claude PR Review

on:
  # Fires directly in this repo for dogfood PR review.
  # pull_request_target runs in the base repo's context (with secrets) even for fork PRs,
  # which prevents auth rejection from claude-code-action. Safe here because no fork code
  # is checked out or executed — Claude only reads the diff via `gh pr diff`.
  pull_request_target:
    types: [opened, synchronize, reopened]
  # Called by external consumers via `uses: glitchwerks/github-actions/.github/workflows/claude-pr-review.yml@v2`.
  workflow_call:
    secrets:
      claude_code_oauth_token:
        required: true
    inputs:
      model:
        description: 'Claude model to use'
        type: string
        required: false
        default: 'claude-sonnet-4-5'
      max_turns:
        description: 'Maximum number of Claude turns'
        type: string
        required: false
        default: '30'

# Required for the pull_request_target trigger in this repo.
# External consumers using workflow_call must declare pull-requests: write in their own caller workflow.
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  review:
    runs-on: ubuntu-latest
    concurrency:
      group: claude-pr-review-${{ github.repository }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: glitchwerks/github-actions/pr-review@v2
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token || secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: ${{ inputs.model || 'claude-sonnet-4-5' }}
          max_turns: ${{ inputs.max_turns || '30' }}
